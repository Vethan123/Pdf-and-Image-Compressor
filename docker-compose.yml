version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: compression-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - compression-network

  compression-app:
    build: .
    container_name: compression-backend-app
    ports:
      - "8080:8080"
    environment:
      - USER_HOME=/app
      # Injecting Spring Boot parameters directly into the environment variables
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/compress_db
      - SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE=50MB
      - SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE=50MB
    volumes:
      - ./shared_compressed_files:/app/compressed_files
    depends_on:
      - mongodb
    networks:
      - compression-network

volumes:
  mongo-data:

networks:
  compression-network:
    driver: bridge